name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  merge-prerequisities:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build theodore
        run: pnpm --filter theodore-js build && pnpm --filter @theodore/playground build && pnpm --filter @theodore/landing build

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run theodore-js unit tests
        run: pnpm --filter theodore-js test

      - name: Run prettier
        run: pnpm prettier:check

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build theodore-js (playground dev resolves dist)
        run: pnpm --filter theodore-js build

      - name: Install Playwright Chromium
        run: pnpm --filter theodore-js run test:e2e:install

      - name: Run Playwright e2e
        run: pnpm --filter theodore-js run test:e2e:ci
